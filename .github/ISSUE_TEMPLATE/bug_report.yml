name: Bug report
description: Something is not working correctly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before opening an issue, run `:checkhealth live-share` — it catches most configuration problems automatically.
        Also check [TROUBLESHOOTING.md](../blob/main/TROUBLESHOOTING.md) for common issues.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start host with :LiveShareHostStart
        2. Join with :LiveShareJoin <url>
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: neovim_version
    attributes:
      label: Neovim version
      placeholder: "nvim --version output"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Linux / macOS / Windows"
    validations:
      required: true

  - type: input
    id: transport
    attributes:
      label: Transport
      placeholder: "ws (default) or punch"
    validations:
      required: true

  - type: input
    id: service
    attributes:
      label: Tunnel service
      placeholder: "nokey@localhost.run / serveo.net / ngrok / bore"
    validations:
      required: true

  - type: textarea
    id: checkhealth
    attributes:
      label: ":checkhealth live-share output"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Debug logs (if any)
      description: Set `debug = true` in your config and reproduce the issue.
      render: shell
    validations:
      required: false
